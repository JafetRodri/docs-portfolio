site_name: Jafet Rodríguez — Documentation & Process Governance
site_description: Documentation governance, knowledge base architecture, and technical writing portfolio.

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy

nav:
  - Home: index.md
  - Capabilities:
    - Documentation Governance: iso-governance.md
    - Knowledge Base Architecture: kb-architecture.md
    - Process Flow Diagrams: process-flow.md
    - Migration Case Study: migration-case-study.md
  - Document Samples:
    - Standard Operating Procedure: sop.md
    - Concept Explainer (TLP): tlp.md
  - Technical Work:
    - API Reference: api.md
    - KB Document Generator: kb-generator.md
    - Quick Start Guide: quickstart.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
