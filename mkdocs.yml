site_name: Jafet Rodríguez — Documentation & Process Governance
site_description: Documentation governance, knowledge base architecture, and technical writing portfolio.

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
  features:
    - navigation.top
    - navigation.footer
    - content.code.copy

nav:
  - Home: index.md
  - How I Work: how-i-work.md
  - Document Showcase: document-showcase.md
  - Case Study: case-study.md

extra_javascript:
  - javascripts/resize-embeds.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
