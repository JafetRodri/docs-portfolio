site_name: Jafet Rodríguez — Documentation Portfolio
site_description: Technical documentation samples, references, and case studies.

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy

nav:
  - Home: index.md
  - Standard Operating Procedure: sop.md
  - API Reference: api.md
  - Quick Start Guide: quickstart.md
  - Concept Explainer: tlp.md
  - Case Study — KB Generator: kb-generator.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - toc:
      permalink: true
